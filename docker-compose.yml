version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: kubercalc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kubercalc
      POSTGRES_PASSWORD: kubercalc
      POSTGRES_DB: kubercalc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubercalc -d kubercalc"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubercalc-api
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=postgresql://kubercalc:kubercalc@db:5432/kubercalc
      - ENVIRONMENT=development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubercalc-bot
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://kubercalc:kubercalc@db:5432/kubercalc
      - ENVIRONMENT=development
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m bot.main

volumes:
  postgres_data:
